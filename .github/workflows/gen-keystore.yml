name: Generate Release Keystore (one-shot)

# 一次性：在云端用 keytool 生成固定签名密钥（本机无 java，故在 CI 生成）。
# 只手动触发（workflow_dispatch）。产出 artifact 含：
#   - release.jks.b64   ：keystore 的单行 base64（配进 Secret RELEASE_KEYSTORE_BASE64）
#   - passwords.txt     ：随机生成的库/key 密码 + 别名（配进其余 3 个 Secret）
#   - README-SECRETS.txt：操作说明
#
# ⚠️ 安全：keystore 与明文密码会短暂存在于本次 run 的 artifact（私有仓库仅你可见）。
#         下载保存 + 配完 Secret 后，请立即删除本次 run 的 artifact。
# ⚠️ keystore 丢失 = 永远无法再发布能覆盖安装的更新，务必离线备份 release.jks 本体与密码。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Generate keystore + random passwords
        run: |
          set -euo pipefail
          mkdir -p out

          # 随机密码（库密码 = key 密码，简化）。base64 去掉易混字符。
          STORE_PASS="$(openssl rand -base64 24 | tr -d '/+=' | head -c 28)"
          KEY_ALIAS="goldphone"

          keytool -genkeypair -v \
            -keystore out/release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$STORE_PASS" \
            -dname "CN=Gold Phone, OU=XE, O=XE, L=NA, ST=NA, C=CN"

          # 单行 base64（无换行，CI 解码才不会出错）
          base64 -w0 out/release.jks > out/release.jks.b64

          # 密码清单（供复制进 Secret）
          {
            echo "RELEASE_STORE_PASSWORD=$STORE_PASS"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$STORE_PASS"
          } > out/passwords.txt

          cat > out/README-SECRETS.txt <<'EOF'
          ┌─ 固定签名密钥已生成。请按以下步骤配置（一次性）─────────────────┐

          1) 仓库 → Settings → Secrets and variables → Actions → New repository secret
             配 4 个 secret（值见 passwords.txt + release.jks.b64）：

               RELEASE_KEYSTORE_BASE64  = release.jks.b64 文件的【全部内容】（单行）
               RELEASE_STORE_PASSWORD   = passwords.txt 里的 RELEASE_STORE_PASSWORD
               RELEASE_KEY_ALIAS        = goldphone
               RELEASE_KEY_PASSWORD     = passwords.txt 里的 RELEASE_KEY_PASSWORD
                                          （本方案库密码=key密码，两者填一样）

          2) 离线备份 release.jks 本体 + 密码到密码管理器/加密盘。
             ⚠️ keystore 丢失 = 永远无法再发能覆盖安装的更新。
             （注：本 artifact 里没有 release.jks 原始文件，只有它的 base64；
               若要备份原始文件，可把 release.jks.b64 用 `base64 -d` 还原。）

          3) 配完后，删除本次 workflow run 的 artifact（含明文密码，别久留）。

          4) 回去告诉我「配好了」，我会改正式 CI 用这把密钥签名发包。

          └────────────────────────────────────────────────────────────┘
          EOF

          echo "生成完成。artifact 将含 release.jks.b64 / passwords.txt / README-SECRETS.txt"

      - name: Upload keystore bundle (download then DELETE this artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-SECRETS-download-then-delete
          path: out/
          retention-days: 1
